name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.1.0"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  MUPDF_VERSION: 1.27.2
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-macos:
    name: build macOS app
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Cache MuPDF archive
        uses: actions/cache@v4
        with:
          path: third_party/cache
          key: mupdf-source-${{ env.MUPDF_VERSION }}-${{ hashFiles('third_party/mupdf.version') }}

      - name: Prepare MuPDF
        run: sh scripts/setup-mupdf.sh

      - name: Build Scalpel
        run: |
          set -eu
          . third_party/mupdf.env
          cargo build --release -p scalpel-app

      - name: Package Scalpel.app
        run: |
          set -eu
          arch="$(uname -m)"
          version="${RELEASE_TAG#v}"
          app="dist/Scalpel.app"
          icon_source="crates/scalpel-app/assets/icons/scalpel-mark.png"
          iconset="dist/Scalpel.iconset"
          artifact="Scalpel-${RELEASE_TAG}-macos-${arch}.app.zip"

          rm -rf dist
          mkdir -p "$app/Contents/MacOS" "$app/Contents/Resources" "$iconset"
          cp target/release/scalpel "$app/Contents/MacOS/Scalpel"
          cp README.md LICENSE NOTICES "$app/Contents/Resources/"

          sips -z 16 16 "$icon_source" --out "$iconset/icon_16x16.png"
          sips -z 32 32 "$icon_source" --out "$iconset/icon_16x16@2x.png"
          sips -z 32 32 "$icon_source" --out "$iconset/icon_32x32.png"
          sips -z 64 64 "$icon_source" --out "$iconset/icon_32x32@2x.png"
          sips -z 128 128 "$icon_source" --out "$iconset/icon_128x128.png"
          sips -z 256 256 "$icon_source" --out "$iconset/icon_128x128@2x.png"
          sips -z 256 256 "$icon_source" --out "$iconset/icon_256x256.png"
          sips -z 512 512 "$icon_source" --out "$iconset/icon_256x256@2x.png"
          sips -z 512 512 "$icon_source" --out "$iconset/icon_512x512.png"
          sips -z 1024 1024 "$icon_source" --out "$iconset/icon_512x512@2x.png"
          iconutil -c icns "$iconset" -o "$app/Contents/Resources/Scalpel.icns"

          cat > "$app/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDisplayName</key>
            <string>Scalpel</string>
            <key>CFBundleExecutable</key>
            <string>Scalpel</string>
            <key>CFBundleIconFile</key>
            <string>Scalpel</string>
            <key>CFBundleIdentifier</key>
            <string>com.tooluse-labs.scalpel</string>
            <key>CFBundleName</key>
            <string>Scalpel</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${version}</string>
            <key>CFBundleVersion</key>
            <string>${version}</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
          </dict>
          </plist>
          EOF

          plutil -lint "$app/Contents/Info.plist"
          codesign --force --deep --sign - "$app"
          ditto -c -k --keepParent "$app" "dist/${artifact}"
          shasum -a 256 "dist/${artifact}" > "dist/${artifact}.sha256"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  build-linux:
    name: build Linux tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            libasound2-dev \
            libfontconfig1-dev \
            libgl1-mesa-dev \
            libwayland-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxi-dev \
            libxkbcommon-dev \
            pkg-config

      - name: Cache MuPDF archive
        uses: actions/cache@v4
        with:
          path: third_party/cache
          key: mupdf-source-${{ env.MUPDF_VERSION }}-${{ hashFiles('third_party/mupdf.version') }}

      - name: Prepare MuPDF
        run: sh scripts/setup-mupdf.sh

      - name: Build Scalpel
        run: |
          set -eu
          . third_party/mupdf.env
          cargo build --release -p scalpel-app

      - name: Package Linux tarball
        run: |
          set -eu
          arch="$(uname -m)"
          package="Scalpel-${RELEASE_TAG}-linux-${arch}"
          mkdir -p "dist/${package}"
          cp target/release/scalpel "dist/${package}/scalpel"
          cp README.md LICENSE NOTICES "dist/${package}/"
          tar -czf "dist/${package}.tar.gz" -C dist "${package}"
          shasum -a 256 "dist/${package}.tar.gz" > "dist/${package}.tar.gz.sha256"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error

  build-windows:
    name: build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Cache MuPDF archive
        uses: actions/cache@v4
        with:
          path: third_party/cache
          key: mupdf-source-${{ env.MUPDF_VERSION }}-${{ hashFiles('third_party/mupdf.version') }}

      - name: Prepare MuPDF source
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $versionFile = "third_party/mupdf.version"
          $sourceUrl = (Select-String -Path $versionFile -Pattern "^MUPDF_SOURCE_URL=(.+)$").Matches[0].Groups[1].Value
          $expectedSha = (Select-String -Path $versionFile -Pattern "^MUPDF_SHA256=(.+)$").Matches[0].Groups[1].Value.ToLowerInvariant()
          $cacheDir = "third_party/cache"
          $archive = Join-Path $cacheDir "mupdf-$env:MUPDF_VERSION-source.tar.gz"
          $sourceDir = "third_party/mupdf-$env:MUPDF_VERSION-source"

          New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null
          if (!(Test-Path $archive)) {
            Invoke-WebRequest -Uri $sourceUrl -OutFile $archive
          }
          $actualSha = (Get-FileHash -Algorithm SHA256 $archive).Hash.ToLowerInvariant()
          if ($actualSha -ne $expectedSha) {
            throw "MuPDF archive checksum mismatch. expected=$expectedSha actual=$actualSha"
          }
          if (!(Test-Path $sourceDir)) {
            tar -xzf $archive -C third_party
          }

      - name: Build MuPDF and Scalpel
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $sourceDir = (Resolve-Path "third_party/mupdf-$env:MUPDF_VERSION-source").Path
          $env:SCALPEL_MUPDF_SOURCE_DIR = $sourceDir
          .\scripts\setup-mupdf.ps1
          . .\third_party\mupdf.env.ps1
          $libDir = $env:SCALPEL_MUPDF_LIB_DIR
          $vswhere = Join-Path ${env:ProgramFiles(x86)} "Microsoft Visual Studio/Installer/vswhere.exe"
          $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if (!$vsPath) {
            throw "Visual Studio with MSVC x64 tools was not found"
          }
          $vcvars = Join-Path $vsPath "VC/Auxiliary/Build/vcvars64.bat"

          cmd.exe /c "`"$vcvars`" && call `"third_party\mupdf.env.cmd`" && cargo build --release -p scalpel-app"
          if ($LASTEXITCODE -ne 0) {
            throw "Windows release build failed"
          }
          if (!(Test-Path (Join-Path $libDir "libmupdf.lib"))) {
            throw "MuPDF libmupdf.lib was not produced at $libDir"
          }

      - name: Install WiX Toolset
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          dotnet tool install --global wix --version 6.0.2
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Package Windows installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $package = "Scalpel-$env:RELEASE_TAG-windows-x64"
          $version = $env:RELEASE_TAG.TrimStart("v")
          $distDir = (New-Item -ItemType Directory -Force -Path "dist").FullName
          $inputDir = Join-Path $distDir "wix-input"
          $wxs = Join-Path $distDir "Scalpel.wxs"
          $msi = Join-Path $distDir "$package.msi"

          New-Item -ItemType Directory -Force -Path $inputDir | Out-Null
          Copy-Item "target/release/scalpel.exe" (Join-Path $inputDir "Scalpel.exe")
          Copy-Item "crates/scalpel-app/assets/icons/scalpel.ico" (Join-Path $inputDir "Scalpel.ico")
          Copy-Item "README.md", "LICENSE", "NOTICES" $inputDir

          @"
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Package
              Name="Scalpel"
              Manufacturer="tooluse-labs"
              Version="$version"
              UpgradeCode="{B51E6D6B-0C44-48DA-91C4-1C250C98B726}"
              Scope="perMachine">
              <MajorUpgrade DowngradeErrorMessage="A newer version of Scalpel is already installed." />
              <MediaTemplate EmbedCab="yes" />
              <Icon Id="ScalpelIcon" SourceFile="$inputDir\Scalpel.ico" />
              <Property Id="ARPPRODUCTICON" Value="ScalpelIcon" />
              <Feature Id="Main" Title="Scalpel" Level="1">
                <ComponentRef Id="ScalpelExeComponent" />
                <ComponentRef Id="ReadmeComponent" />
                <ComponentRef Id="LicenseComponent" />
                <ComponentRef Id="NoticesComponent" />
                <ComponentRef Id="StartMenuShortcutComponent" />
              </Feature>
            </Package>

            <Fragment>
              <StandardDirectory Id="ProgramFiles64Folder">
                <Directory Id="INSTALLFOLDER" Name="Scalpel">
                  <Component Id="ScalpelExeComponent" Guid="{E6756D58-FF80-4C63-8C9F-CFD2DDAED62B}">
                    <File Id="ScalpelExeFile" Source="$inputDir\Scalpel.exe" KeyPath="yes" />
                  </Component>
                  <Component Id="ReadmeComponent" Guid="{24F3AA4B-99E9-482B-A06D-BC38EA4C42E7}">
                    <File Id="ReadmeFile" Source="$inputDir\README.md" KeyPath="yes" />
                  </Component>
                  <Component Id="LicenseComponent" Guid="{9F29CD56-8C77-4D8E-818E-A11DA3182D49}">
                    <File Id="LicenseFile" Source="$inputDir\LICENSE" KeyPath="yes" />
                  </Component>
                  <Component Id="NoticesComponent" Guid="{845B69F6-BE76-495E-BCA9-A2F0822DAD32}">
                    <File Id="NoticesFile" Source="$inputDir\NOTICES" KeyPath="yes" />
                  </Component>
                </Directory>
              </StandardDirectory>

              <StandardDirectory Id="ProgramMenuFolder">
                <Directory Id="ApplicationProgramsFolder" Name="Scalpel">
                  <Component Id="StartMenuShortcutComponent" Guid="{933B6413-D70D-4E0A-B132-CE6D197626B8}">
                    <Shortcut
                      Id="ApplicationStartMenuShortcut"
                      Name="Scalpel"
                      Description="Scalpel PDF debugger"
                      Target="[#ScalpelExeFile]"
                      WorkingDirectory="INSTALLFOLDER"
                      Icon="ScalpelIcon" />
                    <RemoveFolder Id="RemoveApplicationProgramsFolder" On="uninstall" />
                    <RegistryValue
                      Root="HKLM"
                      Key="Software\tooluse-labs\Scalpel"
                      Name="Installed"
                      Type="integer"
                      Value="1"
                      KeyPath="yes" />
                  </Component>
                </Directory>
              </StandardDirectory>
            </Fragment>
          </Wix>
          "@ | Out-File -Encoding utf8 $wxs

          wix build $wxs -arch x64 -o $msi
          $hash = (Get-FileHash -Algorithm SHA256 $msi).Hash.ToLowerInvariant()
          "$hash  $package.msi" | Out-File -Encoding ascii "$msi.sha256"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dist/*.msi
            dist/*.sha256
          if-no-files-found: error

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-linux
      - build-windows
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          prerelease: ${{ contains(env.RELEASE_TAG, '-') }}
          files: |
            dist/Scalpel-*.app.zip
            dist/Scalpel-*.tar.gz
            dist/Scalpel-*-windows-*.msi
            dist/*.sha256
