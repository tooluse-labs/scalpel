name: m0

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  contract:
    name: contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy
      - name: M0 local gate
        run: sh scripts/run_m0_local_gate.sh

  c-asan-ubsan:
    name: c-asan-ubsan
    runs-on: ubuntu-latest
    env:
      CC: clang
      CFLAGS: -fsanitize=address,undefined -fno-omit-frame-pointer
      RUSTFLAGS: -Clink-arg=-fsanitize=address -Clink-arg=-fsanitize=undefined
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy
      - name: C shim sanitizer tests
        run: |
          cargo test -p scalpel-shim
          cargo test -p scalpel-core
          cargo test -p scalpel-mcp
          cargo test -p scalpel-contract-tests
          cargo test -p scalpel-app --no-default-features --features gui

  tsan:
    name: tsan
    runs-on: ubuntu-latest
    env:
      CC: clang
      CFLAGS: -fsanitize=thread -fno-omit-frame-pointer
      RUSTFLAGS: -Zsanitizer=thread
      TSAN_OPTIONS: suppressions=${{ github.workspace }}/scripts/tsan_mupdf.supp
    steps:
      - uses: actions/checkout@v4
      - name: Nightly Rust toolchain
        run: |
          rustup toolchain install nightly --profile minimal
          rustup component add rust-src --toolchain nightly
      - name: Thread sanitizer smoke
        run: >
          cargo +nightly test -Zbuild-std
          --target x86_64-unknown-linux-gnu
          -p scalpel-core
          session::tests

  fuzz-smoke:
    name: fuzz-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy
      - name: Deterministic M0 fuzz smoke
        run: sh scripts/run_m0_fuzz_smoke.sh
