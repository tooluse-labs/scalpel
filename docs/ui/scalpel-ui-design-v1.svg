      .title { font-size: 16px; font-weight: 700; fill: #1f2933; }
      .h2 { font-size: 13px; font-weight: 700; fill: #1f2933; }
      .label { font-size: 12px; fill: #354250; }
      .muted { font-size: 11px; fill: #687483; }
      .tiny { font-size: 10px; fill: #7a8593; }
